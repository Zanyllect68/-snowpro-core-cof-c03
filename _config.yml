title: "SnowPro Core COF-C03 — Recursos de Estudio"
description: >
  Repositorio completo de estudio en español para la certificación SnowPro Core (COF-C03).
  Incluye apuntes teóricos, guías DORA, calendario interactivo de 46 días, 30 preguntas tipo examen,
  referencia SQL completa con ejemplos, tutorial para principiantes y plan de estudio detallado.
  Organizado por los 5 dominios del examen oficial.
theme: null
markdown: GFM
highlighter: rouge
include:
  - index.html
  - README.md
  - assets
exclude:
  - .gitignore
  - node_modules
defaults:
  - scope:
      path: ""
    values:
      layout: null
      lang: es
